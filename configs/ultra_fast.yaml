# Ultra-fast config for async eval testing
board_size: 6
initial_health: 2
attack_power: 1
heal_power: 1
diag_heal: true
diag_attack: true

in_channels: 11
channels: 32
n_blocks: 4

n_simulations_train: 20
n_simulations_eval: 30
c_puct: 1.5
dirichlet_alpha: 0.3
dirichlet_epsilon: 0.25

iterations: 3
selfplay_games_per_iter: 1
train_batches_per_iter: 20
batch_size: 32
lr: 0.02
weight_decay: 0.0001
lr_min: 0.0005
grad_clip: 1.0

buffer_capacity: 5000
cold_start_random_games: 5

eval_every: 3
arena_games: 4
win_rate_threshold: 0.55

checkpoint_dir: "../checkpoints"
log_dir: "../logs"
device: "cpu"
seed: 42
async_eval: true
eval_n_games: 4
